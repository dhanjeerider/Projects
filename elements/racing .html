<script>
'use strict';
/* ================= CONSTANTS & CONFIG ================= */
const GRAV = 22;                 
const MASS = 1, INERTIA = 0.9;
const WHEEL_R = 0.38;
const SUSP_K = 170, SUSP_C = 11; 
const MU = 1.5;                  
const DRIVE_F = 14;              
const BRAKE_K = 5;
const ROLL_RES = 0.08;
const MAX_SPEED = 22, MAX_REVERSE = 7;
const AIR_T = 9.5; 
const WHEELIE_T = 2.2;           
const FUEL_MAX = 100, HEALTH_MAX = 100;
const DRAIN_DRIVE = 100/60, DRAIN_IDLE = 0.2;
const FUEL_CAN_INTERVAL = 50;
const FLIP_TIME_LIMIT = 1.2;     

let state = 'LOADING'; 
let coins = 0, distance = 0, fuel = FUEL_MAX, health = HEALTH_MAX;
let canTimer = 0, stillTime = 0, flipTime = 0;
let best = +(localStorage.getItem('hc2d_best') || 0);
let crashAnimTime = 0, crashFrame = 0, crashHoldTimer = 0;
let audioUnlocked = false; // System lock tracker for mobile

/* ================= ASSET LOADING & AUDIO ================= */
let assetsLoaded = 0;
const totalAssets = 6;
const elLoadProgress = document.getElementById('loadProgress');

function assetReady() {
    assetsLoaded++;
    elLoadProgress.textContent = assetsLoaded;
    if (assetsLoaded >= totalAssets) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('menu').classList.remove('hidden');
        state = 'MENU';
    }
}

// Images Setup
const carImg = new Image();
carImg.onload = assetReady; carImg.onerror = assetReady;
carImg.src = "https://pub-742a4db0fefe4d9b9bf82cf1432444c3.r2.dev/Hill%20Climb%20Modi/Modi%20Hill%20climb.webp";

const enemyImg = new Image();
enemyImg.onload = assetReady; enemyImg.onerror = assetReady;
enemyImg.src = "https://pub-742a4db0fefe4d9b9bf82cf1432444c3.r2.dev/Hill%20Climb%20Modi/Rahul%20Gandi%20Sprite.webp";

const crashImg = new Image();
crashImg.onload = assetReady; crashImg.onerror = assetReady;
crashImg.src = "https://pub-742a4db0fefe4d9b9bf82cf1432444c3.r2.dev/Hill%20Climb%20Modi/crash.webp";

// Audio Setup
function setupAudio(url, loop, volume) {
    const aud = new Audio();
    aud.src = url;
    aud.loop = loop;
    aud.volume = volume;
    aud.preload = "auto";
    aud.addEventListener('loadeddata', assetReady, { once: true });
    aud.addEventListener('error', assetReady, { once: true });
    aud.load();
    return aud;
}

const bgMusic = setupAudio("https://pub-742a4db0fefe4d9b9bf82cf1432444c3.r2.dev/Hill%20Climb%20Modi/Hill%20Climb%20BG%20music.mp3", true, 0.2);
const crashSound = setupAudio("https://pub-742a4db0fefe4d9b9bf82cf1432444c3.r2.dev/Hill%20Climb%20Modi/Khtm%20gaya%20(Hill%20climb).mp3", false, 1.0);

// AUDIO POOL for ZERO DELAY Kill Sound
const killPool = [
    setupAudio("https://pub-f5acc21903e442ac86d7544a04395514.r2.dev/bhn%20ny%20gory.mp3", false, 1.0),
    setupAudio("https://pub-f5acc21903e442ac86d7544a04395514.r2.dev/bhn%20ny%20gory.mp3", false, 1.0),
    setupAudio("https://pub-f5acc21903e442ac86d7544a04395514.r2.dev/bhn%20ny%20gory.mp3", false, 1.0)
];
let killIdx = 0;
assetsLoaded += 2; // Compensate for the extra 2 kill sounds in the pool

// Playback Functions
function playKillSound() {
    if (document.hidden) return;
    const sfx = killPool[killIdx];
    sfx.currentTime = 0;
    sfx.play().catch(e => {});
    killIdx = (killIdx + 1) % killPool.length;
}

function playCrashSound() {
    if (document.hidden) return;
    crashSound.currentTime = 0;
    crashSound.play().catch(e => {});
}

// Browser Background Control
function pauseAllAudio() {
    bgMusic.pause();
}

function resumeAudio() {
    if (state === 'PLAYING' && !document.hidden) {
        bgMusic.play().catch(e => {});
    }
}

document.addEventListener('visibilitychange', () => document.hidden ? pauseAllAudio() : resumeAudio());
window.addEventListener('blur', pauseAllAudio);
window.addEventListener('focus', resumeAudio);


/* ================= CANVAS & TERRAIN ================= */
const cv = document.getElementById('gameCanvas');
const cx2 = cv.getContext('2d');
let W = 0, H = 0, PPM = 40;
function resize(){
  W = cv.width = innerWidth * Math.min(devicePixelRatio, 2);
  H = cv.height = innerHeight * Math.min(devicePixelRatio, 2);
  PPM = Math.max(28, Math.min(H / 14, W / 20));
}
addEventListener('resize', resize);
resize();

function terrainH(x){
  const ramp = Math.min(1, Math.max(0, (x - 10) / 20));
  if(ramp <= 0) return 0;
  const d = x - 10;
  const diff = Math.min(1, d / 600);
  const A = 2.6 + 3.0 * diff;
  const B = 1.0 + 1.2 * diff;
  const h = A * Math.sin(d * 0.085)
          + B * Math.sin(d * 0.21 + 1.7)
          + 0.35 * Math.sin(d * 0.5 + 0.5);
  return ramp * ramp * h;
}
function slope(x){ return (terrainH(x + 0.3) - terrainH(x - 0.3)) / 0.6; }
function rnd(n){ const s = Math.sin(n * 127.1 + 311.7) * 43758.5453; return s - Math.floor(s); }


/* ================= CAR PHYSICS ================= */
const car = {
  x: 2, y: 1.2, a: 0,
  vx: 0, vy: 0, va: 0,
  wheelSpin: 0,
  wheels: [
    {lx:  0.85, ly: -0.42, drive: false}, 
    {lx: -0.85, ly: -0.42, drive: true }   
  ],
  onGround: false
};

let animFrame = 0, animTime = 0;

function resetCar(){
  car.x = 2; car.y = terrainH(2) + 1.2; car.a = 0;
  car.vx = car.vy = car.va = 0; car.wheelSpin = 0;
  animFrame = 0; animTime = 0;
}
function wheelWorld(w){
  const c = Math.cos(car.a), s = Math.sin(car.a);
  return { x: car.x + w.lx * c - w.ly * s, y: car.y + w.lx * s + w.ly * c };
}
function physStep(dt){
  if (state !== 'PLAYING') return; 
  
  const hasFuel = fuel > 0;
  let fx = 0, fy = -GRAV * MASS, torque = 0;
  let grounded = false;

  for(const w of car.wheels){
    const p = wheelWorld(w);
    const g = terrainH(p.x);
    const pen = g - (p.y - WHEEL_R);
    if(pen <= 0) continue;
    grounded = true;

    const sl = slope(p.x);
    const L = Math.hypot(sl, 1);
    const nx = -sl / L, ny = 1 / L;
    const tx = ny, ty = -nx;

    const rx = p.x - car.x, ry = p.y - car.y;
    const pvx = car.vx - car.va * ry;
    const pvy = car.vy + car.va * rx;
    const vn = pvx * nx + pvy * ny;
    const vt = pvx * tx + pvy * ty;

    let Fn = SUSP_K * pen - SUSP_C * vn;
    if(Fn < 0) Fn = 0;

    let Ft = -ROLL_RES * vt;
    if(input.gas && hasFuel && w.drive && car.vx < MAX_SPEED) Ft += DRIVE_F;
    if(input.brake){
      if(vt > 0.3) Ft += -BRAKE_K * vt;
      else if(hasFuel && w.drive && car.vx > -MAX_REVERSE) Ft += -DRIVE_F * 0.55;
    }
    const maxT = MU * Fn;
    if(Ft >  maxT) Ft =  maxT;
    if(Ft < -maxT) Ft = -maxT;

    const Fx = nx * Fn + tx * Ft;
    const Fy = ny * Fn + ty * Ft;
    fx += Fx; fy += Fy;
    torque += rx * Fy - ry * Fx;
  }
  car.onGround = grounded;

  if(input.gas && hasFuel){
    if(grounded) car.va += WHEELIE_T * dt;
    else         car.va += AIR_T * dt; 
  }
  if(input.brake){
    if(grounded) car.va -= WHEELIE_T * 0.6 * dt;
    else         car.va -= AIR_T * dt; 
  }

  car.vx += (fx / MASS) * dt;
  car.vy += (fy / MASS) * dt;
  car.va += (torque / INERTIA) * dt;
  car.va *= (1 - 0.6 * dt); 
  
  car.x += car.vx * dt;
  car.y += car.vy * dt;
  car.a += car.va * dt;

  if(car.x < 0.5){ car.x = 0.5; if(car.vx < 0) car.vx = 0; }

  const upDot = Math.cos(car.a);
  if(upDot < 0){
    const roofY = car.y + 0.75 * upDot;
    const g = terrainH(car.x);
    if(roofY < g){
      car.y += (g - roofY);
      if(car.vy < 0) car.vy *= -0.15;
      car.vx *= 0.92; car.va *= 0.9;
    }
  }

  if(grounded) car.wheelSpin += (car.vx / WHEEL_R) * dt;
  else if(input.gas && hasFuel) car.wheelSpin += 14 * dt;

  if(car.y < terrainH(car.x) - 6){
    car.y = terrainH(car.x) + 1.5;
    car.vx = car.vy = car.va = 0; car.a = 0;
  }
}


/* ================= ENTITIES & ACTION ================= */
let coinsArr = [], cansArr = [], enemiesArr = [], bulletsArr = [];
let genX = 25, genEnemyX = 70; 

function generateAhead(){
  while(genX < car.x + 60){
    coinsArr.push({x: genX, y: terrainH(genX) + 1.2 + rnd(genX * 3.3) * 0.4, phase: rnd(genX) * 6.28, taken: false});
    genX += 14 + rnd(genX * 2.1) * 12;
  }
  coinsArr = coinsArr.filter(c => !c.taken && c.x > car.x - 25);
  cansArr  = cansArr.filter(c => !c.taken && c.x > car.x - 25);
  
  while(genEnemyX < car.x + 120){ 
    enemiesArr.push({x: genEnemyX, y: terrainH(genEnemyX), shootTimer: 0, dead: false, walking: true});
    genEnemyX += 70; 
  }
  enemiesArr = enemiesArr.filter(e => !e.dead && e.x > car.x - 30);
}

function spawnFuelCan(){
  let bx = car.x + 45, bs = 1e9;
  for(let x = car.x + 45; x < car.x + 85; x += 2){
    const s = Math.abs(slope(x));
    if(s < bs){ bs = s; bx = x; }
  }
  cansArr.push({x: bx, y: terrainH(bx) + 0.5, phase: rnd(bx) * 6.28, taken: false});
}

function updateAction(dt) {
    for(const c of coinsArr){
      if(c.taken || Math.abs(c.x - car.x) > 2.2) continue;
      const dx = c.x - car.x, dy = c.y - car.y;
      if(dx*dx + dy*dy < 1.6){ c.taken = true; coins++; floatText('+1', '#ffd700'); }
    }
    for(const c of cansArr){
      if(c.taken || Math.abs(c.x - car.x) > 2.2) continue;
      const dx = c.x - car.x, dy = c.y - car.y;
      if(dx*dx + dy*dy < 2.0){ c.taken = true; fuel = FUEL_MAX; floatText('&#9981; FUEL 100%', '#7CFC00'); }
    }

    // ENEMIES
    for(let i = enemiesArr.length - 1; i >= 0; i--){
        let e = enemiesArr[i];
        let dx = e.x - car.x;
        
        if (dx > 7) {
            e.x -= 2.5 * dt; 
            e.walking = true;
        } else {
            e.walking = false; 
        }
        e.y = terrainH(e.x); 
        
        let dy = (e.y + 1) - car.y; 
        if(dx*dx + dy*dy < 4.0){ 
            e.dead = true;
            coins += 5; 
            fuel = Math.min(FUEL_MAX, fuel + 5); 
            floatText('SPLAT! +5 Fuel', '#ff4d4d');
            
            playKillSound();
            continue;
        }

        const screenP = worldToScreen(e.x, e.y);
        const onScreen = screenP.x > 0 && screenP.x < W;
        
        if (onScreen && dx > 0) {
            e.shootTimer -= dt;
            if (e.shootTimer <= 0) {
                e.shootTimer = 0.5;
                
                let targetX = car.x;
                let targetY = car.y + 0.4;
                let gunX = e.x - 0.5;
                let gunY = e.y + 1.1;
                let angle = Math.atan2(targetY - gunY, targetX - gunX);
                let speed = 25;

                bulletsArr.push({x: gunX, y: gunY, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed}); 
            }
        }
    }

    // BULLETS
    for(let i = bulletsArr.length - 1; i >= 0; i--){
        let b = bulletsArr[i];
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        
        let dx = b.x - car.x;
        let dy = b.y - (car.y + 0.4); 
        if(dx*dx + dy*dy < 2.0){
            health = Math.max(0, health - 8); 
            floatText('-8% HP', '#ff3b30');
            bulletsArr.splice(i, 1);
            continue;
        }

        if(b.x < car.x - 30 || b.x < 0 || b.y < 0){
            bulletsArr.splice(i, 1);
        }
    }
}

const input = {gas: false, brake: false};
addEventListener('keydown', e => {
  if(e.code === 'ArrowRight' || e.code === 'KeyD') input.gas = true;
  if(e.code === 'ArrowLeft' || e.code === 'KeyA' || e.code === 'Space'){ input.brake = true; e.preventDefault(); }
});
addEventListener('keyup', e => {
  if(e.code === 'ArrowRight' || e.code === 'KeyD') input.gas = false;
  if(e.code === 'ArrowLeft' || e.code === 'KeyA' || e.code === 'Space') input.brake = false;
});
function bindHold(elm, fn){
  const on  = e => { e.preventDefault(); fn(true);  elm.classList.add('pressed'); };
  const off = e => { e.preventDefault(); fn(false); elm.classList.remove('pressed'); };
  elm.addEventListener('touchstart', on, {passive:false});
  elm.addEventListener('touchend', off);
  elm.addEventListener('touchcancel', off);
  elm.addEventListener('mousedown', on);
  elm.addEventListener('mouseup', off);
  elm.addEventListener('mouseleave', off);
  elm.addEventListener('contextmenu', e => e.preventDefault());
}

bindHold(el('brakeBtn'), v => input.brake = v);
function getScore(){ return Math.floor(distance * 2 + coins * 100); }

function startGame(){

/* ================= CAMERA & RENDERING ================= */
let camX = 0, camY = 0;
function worldToScreen(x, y){
  return { x: (x - camX) * PPM + W * 0.32, y: H * 0.58 - (y - camY) * PPM };
}
function updateCamera(dt){
  camX += (car.x - camX) * Math.min(1, dt * 4);
  camY += (Math.max(car.y, terrainH(car.x)) + 0.8 - camY) * Math.min(1, dt * 3);
}

function drawSky(){
  const g = cx2.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#3d7fc4');
  g.addColorStop(0.55, '#8ec9ef');
  g.addColorStop(0.8, '#ffd9a0');
  g.addColorStop(1, '#ffb36b');
  cx2.fillStyle = g;
  cx2.fillRect(0, 0, W, H);
  cx2.beginPath();
  cx2.arc(W * 0.78, H * 0.2, H * 0.06, 0, 6.3);
  cx2.fillStyle = 'rgba(255,240,180,0.95)';
  cx2.shadowColor = '#ffe9a0'; cx2.shadowBlur = 40;
  cx2.fill();
  cx2.shadowBlur = 0;
}
function drawClouds(){
  cx2.fillStyle = 'rgba(255,255,255,0.85)';
  for(let i = 0; i < 7; i++){
    const wx = i * 34 + rnd(i) * 20 - ((camX * 0.1) % 238);
    const sx = ((wx % 238) + 238) % 238 / 238 * (W + 200) - 100;
    const sy = H * (0.08 + rnd(i * 7) * 0.18);
    const r = H * (0.025 + rnd(i * 3) * 0.02);
    cx2.beginPath();
    cx2.arc(sx, sy, r, 0, 6.3);
    cx2.arc(sx + r * 1.2, sy + r * 0.2, r * 0.8, 0, 6.3);
    cx2.arc(sx - r * 1.1, sy + r * 0.25, r * 0.7, 0, 6.3);
    cx2.fill();
  }
}
function drawMountains(factor, color, amp, base, freq){
  cx2.fillStyle = color;
  cx2.beginPath();
  cx2.moveTo(0, H);
  const off = camX * factor;
  for(let sx = 0; sx <= W; sx += 14){
    const wx = sx / PPM + off;
    const y = H * base - (Math.sin(wx * freq) * 0.6 + Math.sin(wx * freq * 2.7 + 2) * 0.4) * amp * PPM;
    cx2.lineTo(sx, y);
  }
  cx2.lineTo(W, H);
  cx2.closePath();
  cx2.fill();
}
function drawTerrain(){
  const step = 6;
  cx2.beginPath();
  cx2.moveTo(-10, H + 10);
  for(let sx = -10; sx <= W + 10; sx += step){
    const wx = camX + (sx - W * 0.32) / PPM;
    const p = worldToScreen(wx, terrainH(wx));
    cx2.lineTo(sx, p.y);
  }
  cx2.lineTo(W + 10, H + 10);
  cx2.closePath();
  const g = cx2.createLinearGradient(0, H * 0.3, 0, H);
  g.addColorStop(0, '#8a5a2b');
  g.addColorStop(0.5, '#6e4422');
  g.addColorStop(1, '#3e2813');
  cx2.fillStyle = g;
  cx2.fill();
  
  cx2.beginPath();
  for(let sx = -10; sx <= W + 10; sx += step){
    const wx = camX + (sx - W * 0.32) / PPM;
    const p = worldToScreen(wx, terrainH(wx));
    sx === -10 ? cx2.moveTo(sx, p.y) : cx2.lineTo(sx, p.y);
  }
  cx2.lineWidth = PPM * 0.22;
  cx2.strokeStyle = '#3fae4a';
  cx2.lineJoin = 'round';
  cx2.stroke();
  cx2.lineWidth = PPM * 0.08;
  cx2.strokeStyle = '#5fd56a';
  cx2.stroke();
}
function drawTrees(){
  for(let i = Math.floor((camX - 14) / 7); i < Math.floor((camX + 26) / 7); i++){
    if(rnd(i * 13.7) > 0.45) continue;
    const tx = i * 7 + rnd(i) * 4;
    if(tx < 14 || Math.abs(slope(tx)) > 0.4) continue;
    const ty = terrainH(tx);
    const p = worldToScreen(tx, ty);
    const s = PPM * (0.8 + rnd(i * 3) * 0.5);
    cx2.fillStyle = '#6b4226';
    cx2.fillRect(p.x - s * 0.06, p.y - s * 0.55, s * 0.12, s * 0.55);
    cx2.fillStyle = '#1e7a2e';
    cx2.beginPath();
    cx2.moveTo(p.x, p.y - s * 1.5);
    cx2.lineTo(p.x - s * 0.42, p.y - s * 0.45);
    cx2.lineTo(p.x + s * 0.42, p.y - s * 0.45);
    cx2.closePath();
    cx2.fill();
    cx2.fillStyle = '#27913a';
    cx2.beginPath();
    cx2.moveTo(p.x, p.y - s * 1.75);
    cx2.lineTo(p.x - s * 0.32, p.y - s * 0.95);
    cx2.lineTo(p.x + s * 0.32, p.y - s * 0.95);
    cx2.closePath();
    cx2.fill();
  }
}
function drawCoins(t){
  for(const c of coinsArr){
    if(c.taken) continue;
    const p = worldToScreen(c.x, c.y + Math.sin(t * 0.003 + c.phase) * 0.12);
    if(p.x < -60 || p.x > W + 60) continue;
    const r = PPM * 0.4;
    const sq = Math.abs(Math.sin(t * 0.0035 + c.phase));
    cx2.save();
    cx2.translate(p.x, p.y);
    cx2.shadowColor = '#ffd700'; cx2.shadowBlur = 18;
    cx2.scale(Math.max(0.18, sq), 1);
    cx2.beginPath(); cx2.arc(0, 0, r, 0, 6.3);
    cx2.fillStyle = '#FFD700'; cx2.fill();
    cx2.shadowBlur = 0;
    cx2.lineWidth = r * 0.16; cx2.strokeStyle = '#c9a200'; cx2.stroke();
    cx2.beginPath(); cx2.arc(0, 0, r * 0.58, 0, 6.3);
    cx2.strokeStyle = '#b8930a'; cx2.stroke();
    cx2.fillStyle = '#b8930a';
    cx2.font = 'bold ' + (r * 0.9) + 'px Orbitron, monospace';
    cx2.textAlign = 'center'; cx2.textBaseline = 'middle';
    cx2.fillText('$', 0, r * 0.05);
    cx2.restore();
  }
}
function drawCans(t){
  for(const c of cansArr){
    if(c.taken) continue;
    const p = worldToScreen(c.x, c.y + Math.sin(t * 0.002 + c.phase) * 0.08);
    if(p.x < -60 || p.x > W + 60) continue;
    const s = PPM * 0.5;
    cx2.save();
    cx2.translate(p.x, p.y);
    cx2.fillStyle = '#CC2200';
    cx2.beginPath();
    cx2.roundRect(-s * 0.45, -s * 0.6, s * 0.9, s * 1.1, s * 0.12);
    cx2.fill();
    cx2.fillStyle = '#FFCC00';
    cx2.fillRect(-s * 0.45, -s * 0.18, s * 0.9, s * 0.22);
    cx2.fillStyle = '#333';
    cx2.fillRect(-s * 0.12, -s * 0.78, s * 0.3, s * 0.2);
    cx2.restore();
  }
}

function drawEnemies(t) {
    const cols = 4, rows = 4;
    const fw = enemyImg.width / cols;
    const fh = enemyImg.height / rows;

    for (const e of enemiesArr) {
        if(e.dead) continue;
        const p = worldToScreen(e.x, e.y);
        if(p.x < -100 || p.x > W + 100) continue;

        cx2.save();
        cx2.translate(p.x, p.y);
        
        const sl = slope(e.x);
        cx2.rotate(-Math.atan(sl));
        cx2.scale(-1, 1); 

        const u = PPM;
        const scaleW = 2.4 * u; 
        const scaleH = (fh / fw) * scaleW;
        const offsetY = -scaleH * 0.88; 

        let col = 0, row = 0;
        if (e.walking) {
            const frameIndex = Math.floor((t / 1000) * 19) % 15;
            col = frameIndex % cols;
            row = Math.floor(frameIndex / cols);
        }

        cx2.drawImage(enemyImg, col * fw, row * fh, fw, fh, -scaleW / 2, offsetY, scaleW, scaleH);
        cx2.restore();
    }
}

function drawCar(){
  const p = worldToScreen(car.x, car.y);
  cx2.save();
  cx2.translate(p.x, p.y);
  cx2.rotate(-car.a);
  const u = PPM;

  // FIX: Ab state CRASHING ho ya health 0 (GAME_OVER mein), dono conditions pe crash sprite draw hogi
  if (state === 'CRASHING' || health <= 0) {
      const cols = 3;
      const rows = 3;
      const fw = crashImg.width / cols;
      const fh = crashImg.height / rows;
      const col = crashFrame % cols;
      const row = Math.floor(crashFrame / cols);

      const scaleW = 4.2 * u; 
      const scaleH = (fh / fw) * scaleW;
      const drawX = -scaleW / 2;
      const drawY = -scaleH / 2 - 0.28 * u; 

      cx2.drawImage(crashImg, col * fw, row * fh, fw, fh, drawX, drawY, scaleW, scaleH);
  } else {
      const cols = 2;
      const rows = 2;
      const fw = carImg.width / cols;
      const fh = carImg.height / rows;
      const col = animFrame % cols;
      const row = Math.floor(animFrame / cols);

      const scaleW = 3.6 * u;
      const scaleH = (fh / fw) * scaleW;
      const drawX = -scaleW / 2;
      const drawY = -scaleH / 2 - 0.28 * u; 

      cx2.drawImage(carImg, col * fw, row * fh, fw, fh, drawX, drawY, scaleW, scaleH);
  }

  cx2.restore();
}

function drawBullets() {
    cx2.fillStyle = '#ffaa00';
    cx2.shadowColor = '#ff4400';
    cx2.shadowBlur = 10;
    
    for (const b of bulletsArr) {
        const p = worldToScreen(b.x, b.y);
        cx2.beginPath();
        cx2.arc(p.x, p.y, PPM * 0.12, 0, Math.PI * 2);
        cx2.fill();
    }
    cx2.shadowBlur = 0;
}

/* ================= GAME LOOP ================= */
let last = performance.now();
function loop(t){
  requestAnimationFrame(loop);
  let dt = Math.min((t - last) / 1000, 0.04);
  last = t;

  const SUB = 5;
  for(let i = 0; i < SUB; i++) physStep(dt / SUB);

  if(state === 'PLAYING'){
    fuel = Math.max(0, fuel - (input.gas && fuel > 0 ? DRAIN_DRIVE : DRAIN_IDLE) * dt);
    distance = Math.max(distance, car.x);
    canTimer += dt;
    if(canTimer >= FUEL_CAN_INTERVAL){ canTimer = 0; spawnFuelCan(); }
    
    generateAhead();
    updateAction(dt);

    if (input.brake) {
        animFrame = 0; 
    } else if (Math.abs(car.vx) > 0.5 || (input.gas && fuel > 0)) {
        animTime += dt;
        if(animTime >= 0.05) { 
            animFrame = (animFrame + 1) % 4;
            animTime = 0;
        }
    } else {
        animFrame = 0; 
    }

    const upDot = Math.cos(car.a);
    const nearGround = (car.y - terrainH(car.x)) < 1.6;
    if(upDot < -0.35 && nearGround && Math.abs(car.vx) < 3){
      flipTime += dt;
      if(flipTime > FLIP_TIME_LIMIT) gameOver('FLIPPED OVER');
    } else flipTime = 0;

    if(fuel <= 0 && Math.abs(car.vx) < 0.4){
      stillTime += dt;
      if(stillTime > 2.5) gameOver('OUT OF FUEL');
    } else stillTime = 0;

    if (health <= 0) {
        state = 'CRASHING';
        car.vx = 0; car.vy = 0; car.va = 0; 
        
        bgMusic.pause();
        playCrashSound(); 
    }

    updateHUD();
  } else if (state === 'CRASHING') {
      crashAnimTime += dt;
      if (crashAnimTime >= (1 / 7)) {
          if (crashFrame < 6) { 
              crashFrame++;
              crashAnimTime = 0;
          } else {
              crashHoldTimer += dt;
              if (crashHoldTimer >= 1.0) {
                  gameOver('CAR DESTROYED');
              }
          }
      }
  }

  updateCamera(dt);

  drawSky();
  drawClouds();
  drawMountains(0.25, 'rgba(90,110,140,0.9)', 3.2, 0.62, 0.045);
  drawMountains(0.45, 'rgba(47,79,63,0.95)', 2.2, 0.72, 0.07);
  drawTrees();
  drawTerrain();
  
  if (state !== 'LOADING') {
      drawEnemies(t);
      drawCans(t);
      drawCoins(t);
      drawBullets();
      drawCar();
  }
}

/* ================= INIT ================= */
resetCar();
generateAhead();
showBest();
updateHUD();
requestAnimationFrame(loop);

            <button id="btn-start-game" class="big-btn" type="button">&#9654; PLAY FULLSCREEN</button>
        </div>

        <!-- PAUSE OVERLAY -->
        <div id="pause-screen">
            <h1>GAME PAUSED</h1>
            <button id="btn-resume" class="big-btn" type="button">RESUME GAME</button>
        </div>

        <div id="game-container">
            <div id="screen-flash"></div>
            <div id="texture-cache"></div>
            <div id="background"></div>
            
            <div id="hud">
                <div class="health-container left">
                    <div class="fighter-name">ACP RAPI</div>
                    <div class="bar-outer"><div id="player-health" class="bar-inner"></div></div>
                </div>
                <div class="vs-box">VS</div>
                <div class="health-container right">
                    <div class="fighter-name">Hindustani bhau</div>
                    <div class="bar-outer"><div id="enemy-health" class="bar-inner"></div></div>
                </div>
            </div>

            <div id="popup-overlay">
                <div id="popup-box">
                    <div id="popup-title">YOU WIN</div>
                    <div id="popup-timer">3</div>
                    <div class="popup-btn-container" id="popup-buttons">
                        <button id="btn-restart" class="popup-btn" type="button">PLAY AGAIN</button>
                        <button id="btn-main-menu" class="popup-btn" type="button">BACK TO MAIN</button>
                    </div>
                </div>
            </div>
            
            <div id="enemy-shadow"></div>
            <div id="enemy"></div>
            <div id="shadow"></div>
            <div id="character"></div>

            <div id="ui-left-controls">
                <div id="joystickBase"><div id="joystickKnob"></div></div>
            </div>

            <div id="ui-right-controls">
                <div id="btn-kick" class="action-img-btn kick-btn"></div>
                <div id="btn-punch" class="action-img-btn punch-btn"></div>
                <div id="btn-jump" class="action-img-btn jump-btn"></div>
            </div>
        </div>

    </div>

    <script>
        // ==========================================
        // AUDIO SYSTEM (Audio Sprites)
        // ==========================================
        const acpAudio = new Audio('https://pub-742a4db0fefe4d9b9bf82cf1432444c3.r2.dev/ACP%20VS%20Bhau/ACP%20Fight%20Sounds.mp3');
        const enemyAudio = new Audio('https://pub-742a4db0fefe4d9b9bf82cf1432444c3.r2.dev/ACP%20VS%20Bhau/bhau%20aidio%20fight.mp3');
        
        let acpAudioTimeout; let enemyAudioTimeout; let enemyDelayedTimeout;
        let isEnemyTaunting = false; let idleTimer = 0; 

        function playACPAudio(start, end) {
            clearTimeout(acpAudioTimeout);
            acpAudio.currentTime = start;
            acpAudio.play().catch(e => {});
            acpAudioTimeout = setTimeout(() => { acpAudio.pause(); }, (end - start) * 1000);
        }

        function playEnemyAudio(start, end, delay = 0) {
            clearTimeout(enemyDelayedTimeout); isEnemyTaunting = false; 
            const action = () => {
                clearTimeout(enemyAudioTimeout); enemyAudio.currentTime = start; enemyAudio.play().catch(e => {});
                if (start === 3.12) isEnemyTaunting = true; 
                enemyAudioTimeout = setTimeout(() => { enemyAudio.pause(); isEnemyTaunting = false; }, (end - start) * 1000);
            };
            if (delay > 0) { enemyDelayedTimeout = setTimeout(action, delay * 1000); } else { action(); }
        }

        function resetIdleState() {
            idleTimer = 0;
            if (isEnemyTaunting) { clearTimeout(enemyDelayedTimeout); clearTimeout(enemyAudioTimeout); enemyAudio.pause(); isEnemyTaunting = false; }
        }

        // ==========================================
        // GAME LOGIC & SPRITES
        // ==========================================
        const bgUrl = "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgA1F5Hy59Qr3okY2iyjvsTmwJEa1cMIyo7A-cJJhSPE5V64gNqrsl-7fhIFNjQeFgyet15IscqWZXuGZ55aiaxLN_cNTOJA1mx_v7eX6KlqXYZzgVLKgl4mZogWS4mUtUOl5xmvj3vZqLC8-TAi_8zQxGRgo_ETac2UCT-e3tB_M4imxVOiEEJw1-M-GoO/s0/ACP%20VS%20BHA%20BG.webp";
        const runSpriteUrl = "https://pub-742a4db0fefe4d9b9bf82cf1432444c3.r2.dev/ACP%20VS%20Bhau/walk%20Acp.webp";
        const punchSpriteUrl = "https://pub-742a4db0fefe4d9b9bf82cf1432444c3.r2.dev/ACP%20VS%20Bhau/acp%20punch.webp";
        const kickSpriteUrl = "https://pub-742a4db0fefe4d9b9bf82cf1432444c3.r2.dev/ACP%20VS%20Bhau/ACP%20kick.webp";
        const enemySpriteUrl = "https://pub-742a4db0fefe4d9b9bf82cf1432444c3.r2.dev/ACP%20VS%20Bhau/Bhao%20punch.webp";
        const enemyPunchSpriteUrl = "https://pub-742a4db0fefe4d9b9bf82cf1432444c3.r2.dev/ACP%20VS%20Bhau/Bhao%20punch.webp";
        const playerFallSpriteUrl = "https://pub-742a4db0fefe4d9b9bf82cf1432444c3.r2.dev/ACP%20VS%20Bhau/ACP%20fell%20down.webp";
        const enemyFallSpriteUrl = "https://pub-742a4db0fefe4d9b9bf82cf1432444c3.r2.dev/ACP%20VS%20Bhau/Bhao%20fall%20down.webp";

        const gameWrapper = document.getElementById('game-wrapper');
        const loadingScreen = document.getElementById('loading-screen');
        const loadingText = document.getElementById('loading-text');
        const startScreen = document.getElementById('start-screen');
        const pauseScreen = document.getElementById('pause-screen');
        const btnStartGame = document.getElementById('btn-start-game');
        const btnResume = document.getElementById('btn-resume');
        const gameContainer = document.getElementById('game-container');
        const textureCache = document.getElementById('texture-cache');
        
        const background = document.getElementById('background');
        const character = document.getElementById('character');
        const shadow = document.getElementById('shadow');
        const enemy = document.getElementById('enemy');
        const enemyShadow = document.getElementById('enemy-shadow');

        const popupOverlay = document.getElementById('popup-overlay');
        const popupTitle = document.getElementById('popup-title');
        const popupTimer = document.getElementById('popup-timer');
        const popupButtons = document.getElementById('popup-buttons');
        const btnRestart = document.getElementById('btn-restart');
        const btnMainMenu = document.getElementById('btn-main-menu');

        const joystickBase = document.getElementById('joystickBase');
        const joystickKnob = document.getElementById('joystickKnob');
        const btnPunch = document.getElementById('btn-punch');
        const btnKick = document.getElementById('btn-kick');
        const btnJump = document.getElementById('btn-jump');

        let containerWidth = 0; let charScale = 1; let followDistance = 0; let hitRange = 0;
        const frameWidth = 160; const frameHeight = 160; const moveSpeed = 8; 
        
        let xPos = 0; let isMoving = false; let currentDirection = 'right';
        let isJumping = false; let jumpY = 0; let jumpVelocity = 0; const jumpPower = 16; const gravity = 1;
        let isPunching = false; let isKicking = false; let isDead = false; let currentFrame = 0;
        
        const totalValidRunFrames = 11; const runAnimationDelay = 500 / totalValidRunFrames; 
        const totalPunchFrames = 15; const punchAnimationDelay = 800 / totalPunchFrames;
        const totalKickFrames = 15; const kickAnimationDelay = 800 / totalKickFrames;

        let playerHealth = 100; let enemyHealth = 100; let isMatchOver = false;
        let enemyXPos = -200; const enemySpeed = 3.5; let enemyFrame = 0; let enemyDirection = 'right';
        let enemyState = 'walk'; let enemyStateTimer = 0; let enemyFrameTimer = 0; const totalEnemyFrames = 14; 

        let joystickActive = false; let joystickStartX = 0; let joystickStartY = 0; let joystickMaxRadius = 38; 
        let gameLoopRunning = false; let lastTime = 0; const fpsInterval = 1000 / 60; 
        let isPaused = false; 
        let runAnimationInterval; let assetsLoadedCount = 0; let isReady = false; let gameHasStarted = false; 

        function showStartScreen() {
            if(isReady) return; 
            isReady = true;
            background.style.backgroundImage = `url('${bgUrl}')`;
            character.style.backgroundImage = `url('${runSpriteUrl}')`;
            enemy.style.backgroundImage = `url('${enemySpriteUrl}')`;
            loadingScreen.style.display = 'none';
            startScreen.style.display = 'flex';
        }

        setTimeout(showStartScreen, 3000); 

        [bgUrl, runSpriteUrl, punchSpriteUrl, kickSpriteUrl, enemySpriteUrl, enemyPunchSpriteUrl, playerFallSpriteUrl, enemyFallSpriteUrl].forEach(src => {
            const img = new Image();
            img.onload = () => { assetsLoadedCount++; loadingText.innerText = `Downloading Assets... ${Math.floor((assetsLoadedCount / 8) * 100)}%`; if(assetsLoadedCount === 8) showStartScreen(); };
            img.onerror = () => { assetsLoadedCount++; if(assetsLoadedCount === 8) showStartScreen(); };
            img.src = src;
            const preloaderDiv = document.createElement('div'); preloaderDiv.style.backgroundImage = `url('${src}')`; textureCache.appendChild(preloaderDiv);
        });

        function calculateAndSetScale() {
            let dynamicScale = (gameWrapper.clientHeight * 0.45) / 160;
            if(dynamicScale > 3) dynamicScale = 3; if(dynamicScale < 1) dynamicScale = 1; 
            document.documentElement.style.setProperty('--char-scale', dynamicScale);
            return dynamicScale;
        }

        function initializeSizing() {
            containerWidth = gameWrapper.clientWidth; xPos = containerWidth / 2; enemyXPos = -100; charScale = calculateAndSetScale();
            followDistance = 90 * charScale; hitRange = 100 * charScale;
            joystickMaxRadius = (window.innerWidth <= 850) ? 30 : 38; draw();
        }

        window.addEventListener('resize', () => {
            setTimeout(() => {
                containerWidth = gameWrapper.clientWidth; charScale = calculateAndSetScale(); followDistance = 90 * charScale; hitRange = 100 * charScale;
                joystickMaxRadius = (window.innerWidth <= 850) ? 30 : 38;
                const scaledHalfWidth = (frameWidth * charScale) / 2;
                if (xPos > containerWidth - scaledHalfWidth) xPos = containerWidth - scaledHalfWidth;
                draw();
            }, 100);
        });

        // --- PAUSE / RESUME LOGIC ---
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && gameHasStarted && !isMatchOver) {
                isPaused = true; pauseScreen.style.display = 'flex';
                acpAudio.pause(); enemyAudio.pause();
                clearTimeout(acpAudioTimeout); clearTimeout(enemyAudioTimeout); clearTimeout(enemyDelayedTimeout);
            }
        });

        function resumeGame(e) {
            if(e) e.preventDefault();
            isPaused = false; pauseScreen.style.display = 'none';
            lastTime = performance.now(); resetIdleState(); requestAnimationFrame(gameLoop);
        }
        btnResume.addEventListener('click', resumeGame); btnResume.addEventListener('touchend', resumeGame);

        function initiateGameStart(e) {
            if(e) e.preventDefault(); if(gameHasStarted) return; gameHasStarted = true;
            acpAudio.play().catch(e=>{}); acpAudio.pause(); acpAudio.currentTime = 0;
            enemyAudio.play().catch(e=>{}); enemyAudio.pause(); enemyAudio.currentTime = 0;

            try {
                const el = document.documentElement; const reqFs = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
                if (reqFs) reqFs.call(el).then(() => { if (screen.orientation && screen.orientation.lock) screen.orientation.lock("landscape").catch(e=>{}); }).catch(e=>{});
            } catch(error) {}

            startScreen.style.display = 'none'; gameContainer.style.display = 'block';
            setTimeout(() => { initializeSizing(); }, 150);
            if (!gameLoopRunning) { gameLoopRunning = true; lastTime = performance.now(); requestAnimationFrame(gameLoop); }
        }

        btnStartGame.addEventListener("touchend", initiateGameStart); btnStartGame.addEventListener("click", initiateGameStart);

        function draw() {
            let pScaleX = (currentDirection === 'right') ? charScale : -charScale;
            character.style.transform = `translate3d(${Math.round(xPos - (frameWidth / 2))}px, -${Math.round(jumpY * charScale)}px, 0) scaleX(${pScaleX}) scaleY(${charScale})`;
            
            let shadowWidth = 70 * charScale; let shrink = 1; let shadowOpacity = 1;
            if (jumpY > 0) { shrink = 1 - (jumpY / 300); if (shrink < 0.2) shrink = 0.2; shadowOpacity = shrink; }
            shadow.style.transform = `translate3d(${Math.round(xPos - (shadowWidth / 2))}px, 0, 0) scale(${shrink})`; shadow.style.opacity = shadowOpacity;

            let eScaleX = (enemyDirection === 'right') ? (charScale * 0.96) : -(charScale * 0.96);
            enemy.style.transform = `translate3d(${Math.round(enemyXPos - (frameWidth / 2))}px, 0, 0) scaleX(${eScaleX}) scaleY(${charScale * 0.96})`;
            
            let enemyShadowWidth = 70 * charScale;
            enemyShadow.style.transform = `translate3d(${Math.round(enemyXPos - (enemyShadowWidth / 2))}px, 0, 0) scale(1)`;

            if(containerWidth > 0) { let ratioX = xPos / containerWidth; let panX = (0.5 - ratioX) * 10; background.style.transform = `translate3d(${panX.toFixed(2)}%, 0, 0)`; }

            // Ensure enemy frame is safely capped to avoid blank rendering on death
            let renderEnemyFrame = enemyFrame > 14 ? 14 : enemyFrame;
            const eCol = renderEnemyFrame % 4; const eRow = Math.floor(renderEnemyFrame / 4);
            enemy.style.backgroundPosition = `-${eCol * frameWidth}px -${eRow * frameHeight}px`;

            if (isPunching || isKicking || isDead) return;

            if (!isMoving && jumpY === 0) {
                character.style.backgroundImage = `url('${kickSpriteUrl}')`; character.style.backgroundSize = '640px 640px';
                character.style.backgroundPosition = `-${(14 % 4) * frameWidth}px -${Math.floor(14 / 4) * frameHeight}px`;
            } else {
                character.style.backgroundImage = `url('${runSpriteUrl}')`; character.style.backgroundSize = '640px 480px';
                character.style.backgroundPosition = `-${(currentFrame % 4) * frameWidth}px -${Math.floor(currentFrame / 4) * frameHeight}px`;
            }
        }

        // ==========================================
        // MISSING KILL SYSTEM RESTORED HERE
        // ==========================================
        function checkMatchStatus() {
            if (isMatchOver) return true;

            if (playerHealth <= 0) {
                isMatchOver = true;
                isDead = true;
                isMoving = false;
                stopMoving();

                let fallFrame = 0;
                character.style.backgroundImage = `url('${playerFallSpriteUrl}')`;
                character.style.backgroundSize = '640px 640px';

                const fallInterval = setInterval(() => {
                    const fCol = fallFrame % 4;
                    const fRow = Math.floor(fallFrame / 4);
                    character.style.backgroundPosition = `-${fCol * frameWidth}px -${fRow * frameHeight}px`;
                    fallFrame++;
                    if (fallFrame >= 15) {
                        clearInterval(fallInterval);
                        setTimeout(() => { showEndPopup(false); }, 200);
                    }
                }, 700 / 15);
                return true;
            }

            if (enemyHealth <= 0) {
                isMatchOver = true;
                enemyState = 'dead';
                enemyFrame = 0;
                enemy.style.backgroundImage = `url('${enemyFallSpriteUrl}')`;
                enemy.style.backgroundSize = '640px 640px';

                const enemyFallInterval = setInterval(() => {
                    const efCol = enemyFrame % 4;
                    const efRow = Math.floor(enemyFrame / 4);
                    enemy.style.backgroundPosition = `-${efCol * frameWidth}px -${efRow * frameHeight}px`;
                    enemyFrame++;
                    if (enemyFrame >= 15) {
                        clearInterval(enemyFallInterval);
                        setTimeout(() => { showEndPopup(true); }, 200);
                    }
                }, 700 / 15);
                return true;
            }
            return false;
        }

        function triggerEffects(targetX, damage, isPlayerTarget, attackType) {
            gameContainer.classList.remove('shake-effect'); void gameContainer.offsetWidth; gameContainer.classList.add('shake-effect');
            const targetEl = isPlayerTarget ? character : enemy; targetEl.classList.add('hit-flash'); setTimeout(() => targetEl.classList.remove('hit-flash'), 80);

            if (isPlayerTarget) {
                const screenFlash = document.getElementById('screen-flash'); screenFlash.style.opacity = '0.5'; setTimeout(() => screenFlash.style.opacity = '0', 100);
            }

            let yHeight = 60 * charScale; 
            const dmgText = document.createElement('div'); dmgText.className = `damage-text ${isPlayerTarget ? 'dmg-player' : 'dmg-enemy'}`; dmgText.innerText = `-${damage}`;
            let textXOffset = (Math.random() * 40 - 20); dmgText.style.left = `${targetX + textXOffset}px`; dmgText.style.bottom = `calc(15% + ${yHeight}px)`; gameContainer.appendChild(dmgText);
            setTimeout(() => dmgText.remove(), 800); 

            for(let i=0; i < 6; i++) {
                const spark = document.createElement('div'); spark.className = 'spark'; spark.style.left = `${targetX}px`; spark.style.bottom = `calc(15% + ${yHeight}px)`; gameContainer.appendChild(spark);
                const angle = Math.random() * Math.PI * 2; const speed = Math.random() * 80 + 40; 
                spark.animate([ { transform: 'translate3d(0,0,0) scale(1)', opacity: 1 }, { transform: `translate3d(${Math.cos(angle)*speed}px, ${-Math.sin(angle)*speed}px, 0) scale(0)`, opacity: 0 } ], { duration: 400, easing: 'ease-out' });
                setTimeout(() => spark.remove(), 400);
            }

            if (attackType === 'magic-punch') {
                const blast = document.createElement('div'); blast.className = 'magic-blast';
                blast.style.left = `${targetX - ((xPos > enemyXPos) ? -40 : 40)}px`; blast.style.bottom = `calc(15% + ${yHeight}px)`; gameContainer.appendChild(blast);
                setTimeout(() => blast.remove(), 250);
            }
        }

        let deadTimerInterval;
        function showEndPopup(isWin) {
            popupOverlay.style.display = 'flex'; clearInterval(deadTimerInterval);
            if (isWin) {
                popupTitle.innerText = "YOU WIN"; popupTitle.className = "win-title"; btnRestart.innerText = "PLAY AGAIN";
                popupButtons.style.display = 'flex'; popupTimer.style.display = 'none';
            } else {
                popupTitle.innerText = "YOU LOSE"; popupTitle.className = "lose-title"; btnRestart.innerText = "START AGAIN";
                popupButtons.style.display = 'none'; popupTimer.style.display = 'block'; popupTimer.innerText = "3";
                
                playEnemyAudio(11, 14, 0); 
                let count = 3;
                deadTimerInterval = setInterval(() => {
                    count--;
                    if(count > 0) { popupTimer.innerText = count; } else { clearInterval(deadTimerInterval); popupTimer.style.display = 'none'; popupButtons.style.display = 'flex'; }
                }, 1000);
            }
        }

        function resetGame() {
            playerHealth = 100; enemyHealth = 100; isMatchOver = false; isDead = false; isPunching = false; isKicking = false; currentFrame = 0; enemyFrame = 0; enemyState = 'walk'; enemyStateTimer = 0; idleTimer = 0; isEnemyTaunting = false;
            document.getElementById('player-health').style.width = '100%'; document.getElementById('enemy-health').style.width = '100%';
            character.style.backgroundImage = `url('${runSpriteUrl}')`; character.style.backgroundSize = '640px 480px'; enemy.style.backgroundImage = `url('${enemySpriteUrl}')`; enemy.style.backgroundSize = '640px 640px';
            popupOverlay.style.display = 'none'; initializeSizing();
        }

        btnRestart.addEventListener('click', resetGame); btnRestart.addEventListener('touchend', (e) => { e.preventDefault(); resetGame(); });
        btnMainMenu.addEventListener('click', () => { window.location.href = "https://www.sankibytes.com/"; }); btnMainMenu.addEventListener('touchend', (e) => { e.preventDefault(); window.location.href = "https://www.sankibytes.com/"; });

        function gameLoop(timestamp) {
            if (isPaused) return; 
            requestAnimationFrame(gameLoop);
            const elapsed = timestamp - lastTime;
            if (elapsed > fpsInterval) { lastTime = timestamp - (elapsed % fpsInterval); updateGame(elapsed); draw(); }
        }

        function updateGame(elapsed) {
            if (isMatchOver) return;

            if (!isMoving && !isJumping && !isPunching && !isKicking && jumpY === 0) {
                idleTimer += elapsed;
                if (idleTimer >= 2000 && !isEnemyTaunting) { playEnemyAudio(3.12, 9.74, 0); }
            } else {
                if(idleTimer > 0) resetIdleState(); 
            }

            if (isMoving) {
                if (currentDirection === 'left') xPos -= moveSpeed; else if (currentDirection === 'right') xPos += moveSpeed;
                const scaledHalfWidth = (frameWidth * charScale) / 2;
                if (xPos < scaledHalfWidth) xPos = scaledHalfWidth; if (xPos > containerWidth - scaledHalfWidth) xPos = containerWidth - scaledHalfWidth;
            }

            if (isJumping) { jumpY += jumpVelocity; jumpVelocity -= gravity; if (jumpY <= 0) { jumpY = 0; isJumping = false; jumpVelocity = 0; } }

            const distance = xPos - enemyXPos;

            if (enemyState === 'hitback') {
                enemyStateTimer--;
                if (xPos > enemyXPos) { enemyXPos -= 7; } else { enemyXPos += 7; }
                if (enemyXPos < 50) enemyXPos = 50; if (enemyXPos > containerWidth - 50) enemyXPos = containerWidth - 50;
                enemyFrame = Math.floor((1 - (enemyStateTimer / 30)) * 14); if (enemyFrame >= 14) enemyFrame = 13;
                if (enemyStateTimer <= 0) { enemyState = 'walk'; enemyFrame = 0; enemy.style.backgroundImage = `url('${enemySpriteUrl}')`; }
            } else if (enemyState === 'punch') { 
                enemyStateTimer--;
                if (distance > 0) enemyDirection = 'right'; else enemyDirection = 'left';
                enemyFrame = Math.floor((1 - (enemyStateTimer / 42)) * 14); if (enemyFrame >= 14) enemyFrame = 13;

                if (enemyStateTimer === 21) {
                    if (Math.abs(xPos - enemyXPos) <= followDistance + 25 && !isJumping) {
                        let damage = 12; playerHealth -= damage; if (playerHealth < 0) playerHealth = 0; document.getElementById('player-health').style.width = playerHealth + '%';
                        if(!isEnemyTaunting) { playEnemyAudio(3.12, 9.74, 0); }
                        triggerEffects(xPos, damage, true, 'enemy-punch');
                        if (checkMatchStatus()) return;
                    }
                }

                if (enemyStateTimer <= 0) {
                    if (Math.abs(xPos - enemyXPos) <= followDistance) {
                        enemyState = 'punch'; enemyStateTimer = 42; enemyFrame = 0; enemy.style.backgroundImage = `url('${enemyPunchSpriteUrl}')`;
                    } else {
                        enemyState = 'walk'; enemyFrame = 0; enemy.style.backgroundImage = `url('${enemySpriteUrl}')`;
                    }
                }
            } else if (enemyState !== 'dead') {
                if (Math.abs(distance) > followDistance) {
                    if (distance > 0) { enemyXPos += enemySpeed; enemyDirection = 'right'; } else { enemyXPos -= enemySpeed; enemyDirection = 'left'; }
                    enemyFrameTimer++; if (enemyFrameTimer >= 3) { enemyFrameTimer = 0; enemyFrame++; if (enemyFrame >= totalEnemyFrames) enemyFrame = 0; }
                } else {
                    enemyState = 'punch'; enemyStateTimer = 42; enemyFrame = 0; enemy.style.backgroundImage = `url('${enemyPunchSpriteUrl}')`;
                }
            }
        }

        function updateRunAnimation() { if (!isMoving || isPunching || isKicking || isMatchOver) return; currentFrame++; if (currentFrame >= totalValidRunFrames) currentFrame = 0; }

        function startPunch() {
            if (isPunching || isKicking || isMatchOver) return; 
            isPunching = true; resetIdleState();
            
            if (enemyXPos < xPos) currentDirection = 'left'; else if (enemyXPos > xPos) currentDirection = 'right';
            let punchFrameIndex = 0; character.style.backgroundImage = `url('${punchSpriteUrl}')`; character.style.backgroundSize = '640px 640px'; 
            
            const updatePunchFrame = () => { character.style.backgroundPosition = `-${(punchFrameIndex % 4) * frameWidth}px -${Math.floor(punchFrameIndex / 4) * frameHeight}px`; };
            updatePunchFrame();

            const punchInterval = setInterval(() => {
                punchFrameIndex++;
                if (punchFrameIndex === 7) {
                    if (Math.abs(xPos - enemyXPos) <= hitRange && enemyState !== 'hitback' && enemyState !== 'dead') {
                        enemyHealth -= 10; if (enemyHealth < 0) enemyHealth = 0; document.getElementById('enemy-health').style.width = enemyHealth + '%';
                        
                        playACPAudio(2.1, 3.53); 
                        playEnemyAudio(0, 1.85, 1); 
                        triggerEffects(enemyXPos, 10, false, 'magic-punch');

                        // Player un-freeze bug fixed here too
                        if (checkMatchStatus()) { clearInterval(punchInterval); isPunching = false; draw(); return; }
                    }
                }
                if (punchFrameIndex >= totalPunchFrames) { clearInterval(punchInterval); isPunching = false; draw(); } else { updatePunchFrame(); }
            }, punchAnimationDelay);
        }

        function startKick() {
            if (isPunching || isKicking || isMatchOver) return; 
            isKicking = true; resetIdleState();
            
            if (enemyXPos < xPos) currentDirection = 'left'; else if (enemyXPos > xPos) currentDirection = 'right';
            let kickFrameIndex = 0; character.style.backgroundImage = `url('${kickSpriteUrl}')`; character.style.backgroundSize = '640px 640px'; 
            
            const updateKickFrame = () => { character.style.backgroundPosition = `-${(kickFrameIndex % 4) * frameWidth}px -${Math.floor(kickFrameIndex / 4) * frameHeight}px`; };
            updateKickFrame();

            const kickInterval = setInterval(() => {
                kickFrameIndex++;
                if (kickFrameIndex === 7) {
                    if (Math.abs(xPos - enemyXPos) <= hitRange && enemyState !== 'hitback' && enemyState !== 'dead') {
                        enemyHealth -= 20; if (enemyHealth < 0) enemyHealth = 0; document.getElementById('enemy-health').style.width = enemyHealth + '%';
                        
                        playACPAudio(0, 1.64); 
                        playEnemyAudio(0, 1.85, 1); 
                        triggerEffects(enemyXPos, 20, false, 'kick');
                        
                        // Player un-freeze bug fixed here too
                        if (checkMatchStatus()) { clearInterval(kickInterval); isKicking = false; draw(); return; }
                        enemyState = 'hitback'; enemyStateTimer = 30; enemyFrame = 0; enemy.style.backgroundImage = `url('${enemySpriteUrl}')`;
                    }
                }
                if (kickFrameIndex >= totalKickFrames) { clearInterval(kickInterval); isKicking = false; draw(); } else { updateKickFrame(); }
            }, kickAnimationDelay);
        }

        function startJump() { if (isJumping || isMatchOver) return; isJumping = true; jumpVelocity = jumpPower; resetIdleState(); }

        function startMoving(direction) {
            if (isMatchOver) return; if (isMoving && currentDirection === direction) return;
            if (isMoving) stopMoving(); 
            isMoving = true; currentDirection = direction; currentFrame = 1; resetIdleState();
            runAnimationInterval = setInterval(updateRunAnimation, runAnimationDelay);
        }

        function stopMoving() { if (!isMoving) return; isMoving = false; clearInterval(runAnimationInterval); currentFrame = 0; draw(); }

        function handleJoystick(e) {
            e.preventDefault(); if(isMatchOver) return; const touch = e.touches[0];
            if (!joystickActive) { joystickActive = true; const rect = joystickBase.getBoundingClientRect(); joystickStartX = rect.left + rect.width / 2; joystickStartY = rect.top + rect.height / 2; }
            let deltaX = touch.clientX - joystickStartX; let deltaY = touch.clientY - joystickStartY; let distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            if (distance > joystickMaxRadius) { deltaX = (deltaX / distance) * joystickMaxRadius; deltaY = (deltaY / distance) * joystickMaxRadius; }
            joystickKnob.style.transform = `translate3d(${deltaX}px, ${deltaY}px, 0)`;
            if (deltaX < -15) { startMoving('left'); } else if (deltaX > 15) { startMoving('right'); } else { stopMoving(); }
        }

        joystickBase.addEventListener('touchstart', handleJoystick, { passive: false }); joystickBase.addEventListener('touchmove', handleJoystick, { passive: false });
        joystickBase.addEventListener('touchend', (e) => { e.preventDefault(); joystickActive = false; joystickKnob.style.transform = `translate3d(0, 0, 0)`; stopMoving(); }, { passive: false });

        btnPunch.addEventListener('mousedown', (e) => { e.preventDefault(); startPunch(); }); btnPunch.addEventListener('touchstart', (e) => { e.preventDefault(); startPunch(); }, { passive: false });
        btnKick.addEventListener('mousedown', (e) => { e.preventDefault(); startKick(); }); btnKick.addEventListener('touchstart', (e) => { e.preventDefault(); startKick(); }, { passive: false });
        btnJump.addEventListener('mousedown', (e) => { e.preventDefault(); startJump(); }); btnJump.addEventListener('touchstart', (e) => { e.preventDefault(); startJump(); }, { passive: false });

        currentDirection = 'right';

        window.addEventListener('keydown', (e) => {
            if (!gameHasStarted || isMatchOver) return;
            if (['Space', ' ', 'ArrowUp', 'ArrowLeft', 'ArrowRight'].includes(e.key)) { e.preventDefault(); }
            const key = e.key.toLowerCase();
            if (key === 'a' || e.key === 'ArrowLeft') startMoving('left'); else if (key === 'd' || e.key === 'ArrowRight') startMoving('right');
            else if (key === 'w' || e.key === 'ArrowUp' || e.key === ' ') startJump(); else if (key === 'p') startPunch(); else if (key === 'k') startKick();
        });
        window.addEventListener('keyup', (e) => {
            if (!gameHasStarted || isMatchOver) return; const key = e.key.toLowerCase();
            if ((key === 'a' || e.key === 'ArrowLeft') && currentDirection === 'left') stopMoving(); if ((key === 'd' || e.key === 'ArrowRight') && currentDirection === 'right') stopMoving();
        });
    </script>
